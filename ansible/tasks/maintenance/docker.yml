---
- name: Prune Docker system
  hosts: docker

  vars_prompt:
    - name: perform_prune
      prompt: "Perform Docker prune? (yes/no)"
      private: no
      default: "no"

  tasks:
    - name: Prune everything except containers
      community.docker.docker_prune:
        containers: false
        images: true
        images_filters:
          dangling: false
        networks: true
        volumes: true
        builder_cache: true
      when: perform_prune | bool