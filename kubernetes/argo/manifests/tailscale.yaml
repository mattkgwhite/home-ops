apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-oauth
  namespace: tailscale
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: operator-oauth
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: tailscale-k8s
        property: client-id
    - secretKey: client_secret
      remoteRef:
        key: tailscale-k8s
        property: client-secret
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyGroup
metadata:
  name: tailscale-gateway
  namespace: tailscale
spec:
  type: ingress
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale
  namespace: argocd
spec:
  destination:
    namespace: tailscale
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://pkgs.tailscale.com/helmcharts
    chart: tailscale-operator
    targetRevision: 1.98.9
    helm:
      valuesObject:
        # installCRDs: true
        operatorConfig:
          hostname: tailscale-operator
          defaultTags:
            - tag:k8s
        oauth:
          clientId:
            secret:
              name: operator-oauth
              key: client_id
          clientSecret:
            secret:
              name: operator-oauth
              key: client_secret
        apiServerProxyConfig:
          mode: "noauth"
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
---
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: debug
  namespace: tailscale
spec:
  statefulSet:
    pod:
      tailscaleContainer:
        env:
          - name: TS_DEBUG_INGRESS
            value: "true"