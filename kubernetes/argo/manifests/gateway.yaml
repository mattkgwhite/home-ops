apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoygateway-argo
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: argo
    namespace: envoy-gateway
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: argo
  namespace: envoy-gateway
spec:
  logging:
    level:
      default: info
  shutdown:
    drainTimeout: 180s
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        externalTrafficPolicy: Cluster
  # telemetry: ...
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: gateway-tls-reference
  namespace: certificate
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway
  to:
    - group: ""
      kind: Secret
      name: wildcard-production
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  namespace: envoy-gateway
spec:
  gatewayClassName: envoygateway-argo
  addresses:
    - type: IPAddress
      value: "159.69.82.54"
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-production
            namespace: certificate
            group: ""
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: gw
  namespace: envoy-gateway
  annotations:
    external-dns.custom/type: public
spec:
  endpoints:
    - dnsName: gw.nahops.co.uk
      recordType: A
      targets:
        - "159.69.82.54"
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-tailscale
  namespace: argocd
  annotations:
    tailscale.com/proxy-group: tailscale-gateway
    tailscale.com/hostname: argocd
    # tailscale.com/proxy-class: debug # Optional: Use a specific proxy class for debugging
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - name: https
      port: 443
      targetPort: 8080
  selector:
    app.kubernetes.io/name: argocd-server
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-tailscale
  namespace: argocd
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - argocd
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80