---
- name: Create a user on Ubuntu 24.04 LTS Server
  hosts: all
  become: yes

  vars_prompt:
    - name: username
      prompt: "Enter the username to create"
      private: no  # no = input is visible when typing

    - name: enable_sudo
      prompt: "Grant passwordless sudo access? (yes/no)"
      private: no
      default: "no"

    - name: root_ssh_key_path
      prompt: "Path to SSH key file on remote host"
      private: no
      default: "/root/.ssh/authorized_keys"

  tasks:
    - name: Ensure the user exists
      ansible.builtin.user:
        name: "{{ username }}"
        shell: "/bin/bash"
        home: "/home/{{ username }}"
        create_home: yes
        groups: sudo
        append: yes

    - name: Read SSH keys from root user
      ansible.builtin.slurp:
        src: "{{ root_ssh_key_path }}"
      register: root_ssh_keys

    - name: Set up SSH key for the user
      ansible.builtin.authorized_key:
        user: "{{ username }}"
        key: "{{ root_ssh_keys['content'] | b64decode }}"
        state: present
        manage_dir: yes

    - name: Ensure sudo access without password
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ username }}"
        content: "{{ username }} ALL=(ALL) NOPASSWD: ALL"
        mode: "0440"
      when: enable_sudo | bool and username != "root"

